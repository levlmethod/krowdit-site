document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    const faviconLink = '<link rel="icon" href="/favicon.svg" type="image/svg+xml">';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + faviconLink + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;letter-spacing:0.08em;\">SOON<\u002Fspan><\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <a href=\"#why\" style=\"font-size:15px;font-weight:500;color:#1A1714;\" style-hover=\"color:#DE7A18;\">Why Krowdit<\u002Fa>\n      <a href=\"https://calendar.app.google/ZXH58B2NWMHAf2sW6\" style=\"font-size:14.5px;font-weight:600;color:#F7F3EC;background:#1A1714;padding:11px 18px;border-radius:10px;transition:background .2s,color .2s;\" style-hover=\"background:#DE7A18;color:#1A1714;\">Book a consultation<\u002Fa>\n    <\u002Fdiv>\n\n    <button style=\"{{ hamburger }}\" sc-camel-on-click=\"{{ toggleMobile }}\" aria-label=\"Menu\">\n      <span style=\"display:block;width:22px;height:2px;background:#1A1714;\"><\u002Fspan>\n      <span style=\"display:block;width:22px;height:2px;background:#1A1714;\"><\u002Fspan>\n      <span style=\"display:block;width:22px;height:2px;background:#1A1714;\"><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ================= MOBILE MENU ================= -->\n<div style=\"{{ mobileMenu }}\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;\">\n    <span style=\"font-family:'Newsreader',serif;font-weight:400;font-size:25px;color:#1A1714;\">Krowdit<\u002Fspan>\n    <button sc-camel-on-click=\"{{ closeMobile }}\" aria-label=\"Close\" style=\"background:none;border:none;cursor:pointer;font-size:30px;line-height:1;color:#1A1714;\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <a href=\"Krowdit How It Works.dc.html\" sc-camel-on-click=\"{{ closeMobile }}\" style=\"font-family:'Newsreader',serif;font-size:30px;color:#1A1714;padding:14px 0;border-bottom:1px solid #DCD3C4;\">How it works<\u002Fa>\n  <a href=\"#solutions\" sc-camel-on-click=\"{{ closeMobile }}\" style=\"font-family:'Newsreader',serif;font-size:30px;color:#1A1714;padding:14px 0;border-bottom:1px solid #DCD3C4;\">Solutions<\u002Fa>\n  <a href=\"#why\" sc-camel-on-click=\"{{ closeMobile }}\" style=\"font-family:'Newsreader',serif;font-size:30px;color:#1A1714;padding:14px 0;border-bottom:1px solid #DCD3C4;\">Why Krowdit<\u002Fa>\n  <a href=\"https://calendar.app.google/ZXH58B2NWMHAf2sW6\" sc-camel-on-click=\"{{ closeMobile }}\" style=\"margin-top:26px;text-align:center;font-size:16px;font-weight:600;color:#F7F3EC;background:#1A1714;padding:16px;border-radius:12px;\">Book a consultation<\u002Fa>\n<\u002Fdiv>\n\n<!-- ================= HERO ================= -->\n<header style=\"position:relative;max-width:1200px;margin:0 auto;padding:150px 24px 90px;\">\n  <div style=\"position:absolute;top:120px;right:-40px;display:flex;gap:20px;transform:skewX(-18deg);opacity:0.13;pointer-events:none;\">\n    <div style=\"width:26px;height:520px;background:#DE7A18;\"><\u002Fdiv>\n    <div style=\"width:16px;height:520px;background:#DE7A18;opacity:0.6;\"><\u002Fdiv>\n    <div style=\"width:9px;height:520px;background:#DE7A18;opacity:0.35;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:relative;max-width:900px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#DE7A18;margin-bottom:26px;\">Managed Workforce<\u002Fdiv>\n    <h1 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:clamp(44px,6.6vw,86px);line-height:1.02;letter-spacing:-0.02em;margin:0;color:#1A1714;\">The output of your next hire. None of the hiring risk.<\u002Fh1>\n    <p style=\"font-size:clamp(17px,2.1vw,21px);line-height:1.6;color:#4A423B;margin:28px 0 0;max-width:640px;\">Deploy a dedicated Krowdit professional who works as your own — attending your meetings and doing the work, backed by a full team behind the scenes. You pay the salary, not the benefits, taxes, or overhead. Scale up or down, month to month.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:38px;\">\n      <a href=\"https://calendar.app.google/ZXH58B2NWMHAf2sW6\" style=\"font-size:16px;font-weight:600;color:#F7F3EC;background:#1A1714;padding:16px 26px;border-radius:12px;transition:background .2s,color .2s;\" style-hover=\"background:#DE7A18;color:#1A1714;\">Book a consultation<\u002Fa>\n      <a href=\"#how-it-works\" style=\"font-size:16px;font-weight:600;color:#1A1714;background:none;border:1px solid #1A1714;padding:16px 26px;border-radius:12px;transition:background .2s,color .2s;\" style-hover=\"background:#1A1714;color:#F7F3EC;\">See how it works<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#A99C8B;margin-top:30px;\">For growing companies filling a role · Cancel anytime<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ================= PROBLEM ================= -->\n<section style=\"background:#ECE4D7;border-top:1px solid #DCD3C4;border-bottom:1px solid #DCD3C4;\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:84px 24px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#DE7A18;margin-bottom:16px;\">The problem<\u002Fdiv>\n    <h2 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:clamp(30px,4vw,48px);line-height:1.05;letter-spacing:-0.015em;margin:0 0 40px;max-width:15ch;\">Two ways to fill a role. Both cost you.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;\">\n      <div style=\"background:#F7F3EC;border:1px solid #DCD3C4;border-radius:16px;padding:30px 32px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#6B625A;margin-bottom:14px;\">Hiring an employee<\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.6;color:#1A1714;margin:0;\">Slow to fill, expensive to keep, and a coin-flip on whether they can do the job. A bad hire costs months and tens of thousands to unwind.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#F7F3EC;border:1px solid #DCD3C4;border-radius:16px;padding:30px 32px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#6B625A;margin-bottom:14px;\">Renting an agency<\u002Fdiv>\n        <p style=\"font-size:17px;line-height:1.6;color:#1A1714;margin:0;\">Removes some risk, but bills by the hour, works at arm's length, and never quite operates like your own team.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#1A1714;border:1px solid #1A1714;border-radius:16px;padding:30px 32px;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#F2A24A;margin-bottom:14px;\">The third option<\u002Fdiv>\n        <p style=\"font-family:'Newsreader',serif;font-weight:400;font-size:24px;line-height:1.25;color:#F7F3EC;margin:0;\">Krowdit — a managed workforce that works as your own.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= HOW IT WORKS ================= -->\n<section id=\"how-it-works\" style=\"max-width:1200px;margin:0 auto;padding:90px 24px;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#DE7A18;margin-bottom:16px;\">How it works<\u002Fdiv>\n  <h2 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:clamp(30px,4vw,48px);line-height:1.05;letter-spacing:-0.015em;margin:0 0 12px;\">A managed role, running in days.<\u002Fh2>\n  <p style=\"font-size:17px;line-height:1.6;color:#4A423B;max-width:620px;margin:0 0 48px;\">No job posts, no interviews, no onboarding project. Tell us the role and we run it end to end.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:4px;\">\n    <div style=\"padding:26px 26px 32px;border-top:2px solid #1A1714;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#DE7A18;margin-bottom:16px;\">01<\u002Fdiv>\n      <div style=\"font-family:'Newsreader',serif;font-size:23px;color:#1A1714;margin-bottom:8px;line-height:1.2;\">Tell us the role<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.6;color:#6B625A;margin:0;\">Describe the work you need done — the outcomes, the tools, the cadence.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"padding:26px 26px 32px;border-top:2px solid #1A1714;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#DE7A18;margin-bottom:16px;\">02<\u002Fdiv>\n      <div style=\"font-family:'Newsreader',serif;font-size:23px;color:#1A1714;margin-bottom:8px;line-height:1.2;\">We deploy your operator<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.6;color:#6B625A;margin:0;\">A dedicated professional, backed by a support team, systems, and AI — matched and managed by us.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"padding:26px 26px 32px;border-top:2px solid #1A1714;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#DE7A18;margin-bottom:16px;\">03<\u002Fdiv>\n      <div style=\"font-family:'Newsreader',serif;font-size:23px;color:#1A1714;margin-bottom:8px;line-height:1.2;\">They work as your own<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.6;color:#6B625A;margin:0;\">Embedded in your tools and meetings, delivering the output of the role.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"padding:26px 26px 32px;border-top:2px solid #DE7A18;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#DE7A18;margin-bottom:16px;\">04<\u002Fdiv>\n      <div style=\"font-family:'Newsreader',serif;font-size:23px;color:#1A1714;margin-bottom:8px;line-height:1.2;\">Scale as you go<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.6;color:#6B625A;margin:0;\">Ramp up, ramp down, or stop — month to month. We handle everything on the back end.<\u002Fp>\n    <\ ono',monospace;font-size:11px;letter-spacing:0.1em;color:#7A6E5F;\">\n      <span>© 2026 Krowdit. All rights reserved.<\u002Fspan>\n      <span>We respect your data — we never sell it. <a href=\"#\" style=\"color:#A99C8B;\" style-hover=\"color:#DE7A18;\">Privacy<\u002Fa><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { vw: 1200, scrolled: false, solutionsOpen: false, mobileOpen: false, openFaq: 0, focus: 'cost' };\n\n  componentDidMount() {\n    this._r = () => this.setState({ vw: window.innerWidth });\n    window.addEventListener('resize', this._r);\n    this.setState({ vw: window.innerWidth });\n    const sentinel = document.getElementById('top-sentinel');\n    if (sentinel && 'IntersectionObserver' in window) {\n      this._io = new IntersectionObserver((es) => {\n        const s = !es[0].isIntersecting;\n        if (s !== this.state.scrolled) this.setState({ scrolled: s });\n      }, { threshold: 0 });\n      this._io.observe(sentinel);\n    }\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._r);\n    if (this._io) this._io.disconnect();\n  }\n\n  renderVals() {\n    const vw = this.state.vw ?? 1200;\n    const isMobile = vw < 880;\n    const sc = this.state.scrolled;\n\n    const navStyle = {\n      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50,\n      transition: 'background .25s ease, border-color .25s ease',\n      background: sc ? 'rgba(247,243,236,0.9)' : '#F7F3EC',\n      backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',\n      borderBottom: sc ? '1px solid #DCD3C4' : '1px solid #F7F3EC'\n    };\n    const desktopNav = { display: isMobile ? 'none' : 'flex', alignItems: 'center', gap: '30px' };\n    const hamburger = {\n      display: isMobile ? 'flex' : 'none', flexDirection: 'column', gap: '5px',\n      background: 'none', border: 'none', cursor: 'pointer', padding: '8px'\n    };\n    const solPanel = {\n      position: 'absolute', top: 'calc(100% + 12px)', left: '-16px', minWidth: '440px',\n      background: '#fff', border: '1px solid #DCD3C4', borderRadius: '14px', padding: '16px',\n      boxShadow: '0 24px 60px rgba(26,23,20,0.14)', zIndex: 60,\n      display: this.state.solutionsOpen ? 'block' : 'none'\n    };\n    const mobileMenu = {\n      position: 'fixed', inset: 0, zIndex: 70, background: '#F7F3EC',\n      padding: '22px 24px', display: this.state.mobileOpen ? 'flex' : 'none', flexDirection: 'column'\n    };\n\n    const focus = this.state.focus;\n    const tabDefs = [['cost', 'Cost'], ['speed', 'Speed to start'], ['risk', 'If it goes wrong'], ['flex', 'Flexibility'], ['mgmt', 'Management']];\n    const focusTabs = tabDefs.map(([k, l]) => ({\n      key: k, label: l, onClick: () => this.setState({ focus: k }),\n      style: { fontFamily: \"'Archivo',sans-serif\", fontSize: '13.5px', fontWeight: 600, cursor: 'pointer', padding: '9px 16px', borderRadius: '100px', border: k === focus ? '1px solid #1A1714' : '1px solid #DCD3C4', background: k === focus ? '#1A1714' : '#F7F3EC', color: k === focus ? '#F7F3EC' : '#4A423B' }\n    }));\n\n    const rowDefs = [\n      { key: 'cost', attr: 'Cost', k: 'The salary — no benefits, taxes, or overhead', e: 'Salary + benefits + taxes + overhead', a: 'Hourly or retainer, often more' },\n      { key: 'speed', attr: 'Speed to start', k: 'Starts in days', e: 'Weeks to months', a: 'Weeks' },\n      { key: 'risk', attr: 'If it goes wrong', k: 'Stop or swap, month to month', e: 'Severance and a lost quarter', a: 'Contract exit, start over' },\n      { key: 'flex', attr: 'Flexibility', k: 'Scale up or down anytime', e: 'Hire-and-fire cycle', a: 'Renegotiate the contract' },\n      { key: 'mgmt', attr: 'Management', k: 'Fully managed by Krowdit', e: 'You manage them', a: 'You brief and chase' }\n    ];\n    const compareRows = rowDefs.map((r, i) => {\n      const active = r.key === focus;\n      return {\n        ...r,\n        rowStyle: {\n          display: 'grid', gridTemplateColumns: '1.3fr 1fr 1fr 1fr',\n          borderBottom: i === rowDefs.length - 1 ? '1px solid #F7F3EC' : '1px solid #E2D8C7',\n          background: active ? '#F4E9D8' : '#F7F3EC',\n          borderRadius: active ? '8px' : '0px'\n        }\n      };\n    });\n\n    const faqDefs = [\n      { q: 'How is this different from an agency or offshoring?', a: 'An agency bills by the hour and works at arm\\u2019s length; offshoring hands you a contractor to manage yourself. Krowdit deploys a dedicated professional who works inside your tools and cadence as your own team \\u2014 fully managed by us, for a flat monthly fee.' },\n      { q: 'Will they really work like my own employee?', a: 'Yes. Your operator is embedded in your systems, joins your meetings, and owns the outcomes of the role. The difference lives on the back end: recruiting, management, tooling, and continuity are ours, not yours.' },\n      { q: 'What about quality and control?', a: 'You direct the work and see the output daily. We manage performance, back every role with AI and shared systems, and step in the moment something slips \\u2014 so the standard holds without you becoming a manager.' },\n      { q: 'What if it doesn\\u2019t work out?', a: 'You\\u2019re month to month. Scale down, swap the operator, or stop \\u2014 no severance, no rehiring, no lost quarter. The risk that comes with a hire simply isn\\u2019t yours to carry.' }\n    ];\n    const faqs = faqDefs.map((f, i) => ({\n      q: f.q, a: f.a,\n      open: this.state.openFaq === i,\n      icon: this.state.openFaq === i ? '\\u2013' : '+',\n      onClick: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i }))\n    }));\n\n    return {\n      isMobile, navStyle, desktopNav, hamburger, solPanel, mobileMenu,\n      onSolEnter: () => this.setState({ solutionsOpen: true }),\n      onSolLeave: () => this.setState({ solutionsOpen: false }),\n      toggleMobile: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),\n      closeMobile: () => this.setState({ mobileOpen: false }),\n      focusTabs, compareRows, faqs\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
